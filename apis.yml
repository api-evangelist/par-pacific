aid: par-pacific
name: Par Pacific Holdings
description: >-
  Par Pacific Holdings is an entrepreneurial liquid fuels company focused on
  owning and operating energy and infrastructure businesses in logistically-
  complex markets. The company operates refining, retail, and logistics
  businesses across Hawaii, Washington, Wyoming, and Montana, with retail
  brands including 76, Hele, and nomnom.
